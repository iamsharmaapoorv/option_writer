name: Run Groww Scraper

on:
  # schedule:
  #   # TradingView returns at 8:45 AM IST = 03:15 UTC on weekdays
  #   - cron: "15 3 * * 1-5"
  #   # Option writer at 9:25 AM IST = 03:55 UTC on weekdays
  #   - cron: "55 3 * * 1-5"
  #   # Option writer at 1:00 PM IST = 07:30 UTC on weekdays
  #   - cron: "30 7 * * 1-5"
  workflow_dispatch: # allow manual trigger

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run option writer manually
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python option_writer.py
